services:
  frontend:
    build:
      context: .
      target: frontend
    environment:
      BACKEND_URL: http://backend:3000
    ports:
      - "${FRONTEND_PORT:-18080}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

  backend:
    build:
      context: .
      target: backend
    environment:
      PORT: 3000
      DATABASE_URL: "postgres://${POSTGRES_USER:-birdsign}:${POSTGRES_PASSWORD:-birdsign}@database:5432/${POSTGRES_DB:-birdsign}"
    ports:
      - "${BACKEND_PORT:-18081}:3000"
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "node -e \"fetch('http://127.0.0.1:3000/api/health').then(r=>process.exit(r.ok?0:1)).catch(()=>process.exit(1))\""
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    restart: unless-stopped

  database:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: "${POSTGRES_DB:-birdsign}"
      POSTGRES_USER: "${POSTGRES_USER:-birdsign}"
      POSTGRES_PASSWORD: "${POSTGRES_PASSWORD:-birdsign}"
    ports:
      - "${POSTGRES_PORT:-15432}:5432"
    volumes:
      - birdsign-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-birdsign} -d ${POSTGRES_DB:-birdsign}"]
      interval: 10s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  birdsign-postgres-data:

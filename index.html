<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#e8f1e9" />
    <base href="/" />
    <title>NFC 今日鸟签</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css?v=20260519i" />
  </head>
  <body>
    <div class="habitat-bg" aria-hidden="true">
      <div class="sky"></div>
      <div class="sun"></div>
      <div class="mist mist-one"></div>
      <div class="mist mist-two"></div>
      <div class="ridge ridge-back"></div>
      <div class="ridge ridge-front"></div>
      <div class="water"></div>
      <div class="forest forest-left"></div>
      <div class="forest forest-right"></div>
      <div class="reeds reeds-left"></div>
      <div class="reeds reeds-right"></div>
    </div>

    <main id="app" class="app-shell">
      <section id="home-screen" class="screen active" aria-label="今日鸟签">
        <header class="home-head">
          <p class="eyebrow" id="entry-label">NFC碰一碰抽签</p>
          <h1>今日鸟签</h1>
          <p class="subcopy">每天翻开一张鸟签，查看你的好运指南</p>
        </header>

        <section class="draw-stage" aria-label="抽取今日鸟签">
          <div class="stage-topline">
            <span id="today-text">今日</span>
            <span id="daily-status" class="status-pill">待翻开</span>
          </div>
          <div id="daily-countdown" class="daily-countdown" style="display:none"></div>

          <button id="draw-card" class="bird-sign unrevealed" type="button" aria-label="翻开今日鸟签">
            <span class="ambient-ring"></span>
            <span class="sign-back">
              <span class="seal-mark" aria-hidden="true"></span>
              <span class="seal-title">鸟签待翻开</span>
              <span class="seal-copy">轻点一下，让小鸟从栖息地里出现吧</span>
            </span>
            <span class="sign-front">
              <span class="state-label">今日鸟签</span>
              <span class="bird-frame">
                <img id="active-bird-image" src="" alt="" />
              </span>
              <strong id="active-bird-name" class="daily-name">麻雀</strong>
              <span id="active-bird-look" class="look-line">褐背、黑喉、小圆身</span>
              <span id="active-bird-quote" class="quote">今天像麻雀：事很多，但每件都能啄两口。</span>
            </span>
          </button>

          <div class="primary-actions">
            <button id="draw-button" class="primary" type="button">翻开今日鸟签</button>
            <button id="share-poster-button" class="poster-entry" type="button" style="display:none">🖼️ 生成分享图</button>
          </div>
        </section>

        <section class="home-note" aria-label="今日鸟签说明">
          <div>
            <span>本地记录</span>
            <strong id="unlock-count">0 / 34</strong>
          </div>
          <p>每天固定一签，翻开过的鸟会在这台设备上收录。</p>
          <a class="brand-pill" href="https://www.xiaohongshu.com/user/profile/27440953987" target="_blank" rel="noopener">🪶 Joyi 的小红书</a>
          <div class="preview-tools" aria-label="本地预览工具">
            <button id="reset-preview-button" class="preview-reset" type="button">重置预览状态</button>
            <button id="unlock-all-button" class="preview-reset preview-unlock-all" type="button">一键揭开所有鸟</button>
            <div id="nfc-simulator" class="nfc-simulator">
              <input id="nfc-sim-input" type="text" placeholder="输入 NFC tag ID 模拟" class="nfc-sim-input" />
              <button id="nfc-sim-button" class="nfc-sim-btn" type="button">模拟 NFC</button>
            </div>
          </div>
        </section>
      </section>

      <section id="nest-screen" class="screen" aria-label="鸟类图鉴">
        <header class="page-head">
          <button id="back-home" class="icon-button" type="button" aria-label="返回今日鸟签">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M15 18l-6-6 6-6" />
            </svg>
          </button>
          <div>
            <p class="eyebrow">已入窝的鸟团团</p>
            <h1>小鸟自留地</h1>
          </div>
        </header>

        <section class="guide-summary">
          <div>
            <span>已收录</span>
            <strong id="guide-count">0</strong>
          </div>
          <p>可收录的鸟团团会定期更新</p>
          <a class="brand-pill" href="https://www.xiaohongshu.com/user/profile/27440953987" target="_blank" rel="noopener">🪶 Joyi 的小红书</a>
          <div class="progress-track">
            <span id="guide-progress"></span>
          </div>
        </section>

        <div id="guide-filters" class="guide-filters"></div>
        <section id="bird-grid" class="bird-grid" aria-label="34 只鸟图鉴"></section>
      </section>

      <section id="poster-screen" class="screen" aria-label="分享海报">
        <header class="page-head poster-head">
          <button id="poster-back-home" class="icon-button" type="button" aria-label="返回今日鸟签">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M15 18l-6-6 6-6" />
            </svg>
          </button>
          <div>
            <p class="eyebrow">分享海报</p>
            <h1>把今天发给朋友</h1>
          </div>
        </header>

        <article class="poster-card" aria-label="今日鸟签分享海报">
          <p class="poster-brand">BIRD MOOD CLUB</p>
          <p id="poster-date" class="poster-date">今日</p>
          <div class="poster-art">
            <img id="poster-bird-image" src="" alt="" />
          </div>
          <p class="state-label">今日鸟签</p>
          <h2 id="poster-bird-name">鸟签待翻开</h2>
          <p id="poster-bird-look" class="poster-look">先翻开今日鸟签</p>
          <p id="poster-bird-quote" class="poster-quote">今天的鸟还在晨雾里。</p>
          <div class="poster-foot">
            <span>NFC 鸟签</span>
            <span>截图分享今日状态</span>
          </div>
        </article>

        <button id="save-poster" class="primary poster-save" type="button">提示截图保存</button>
      </section>
    </main>

    <aside id="bird-detail-modal" class="bird-detail-modal" aria-hidden="true" aria-label="鸟签详情">
      <div class="detail-backdrop" id="bird-detail-backdrop"></div>
      <div class="detail-sheet">
        <button id="detail-close" class="detail-close" type="button" aria-label="关闭详情">✕</button>
        <div class="detail-art"><img id="detail-bird-image" src="" alt="" /></div>
        <p class="detail-rank" id="detail-bird-rank">No.1</p>
        <h2 id="detail-bird-name">鸟名</h2>
        <p class="detail-look" id="detail-bird-look">外观描述</p>
        <p class="detail-quote" id="detail-bird-quote">签名</p>
        <p class="detail-habitat" id="detail-bird-habitat">栖息地</p>
        <button id="detail-call-button" class="detail-call" type="button">🔊 播放鸟鸣</button>
        <a class="brand-pill" href="https://www.xiaohongshu.com/user/profile/27440953987" target="_blank" rel="noopener">🪶 Joyi 的小红书</a>
        <button id="detail-shot-button" class="detail-shot" type="button">📸 截图保存</button>
      </div>
    </aside>

    <nav class="tabbar" aria-label="页面切换">
      <button class="tab active" data-screen="home" type="button">今日</button>
      <button class="tab" data-screen="nest" type="button">鸟窝</button>
    </nav>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="./web/assets/meta/birds-data.js"></script>
    <script src="./script.js" defer></script>
  </body>
</html>

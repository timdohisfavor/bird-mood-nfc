<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
    <meta name="theme-color" content="#edf5ef" />
    <title>NFC 今日鸟签</title>
    <link rel="icon" href="data:," />
    <link rel="stylesheet" href="./styles.css" />
  </head>
  <body>
    <div class="habitat-bg" aria-hidden="true">
      <div class="sky"></div>
      <div class="sun"></div>
      <div class="ridge ridge-back"></div>
      <div class="ridge ridge-front"></div>
      <div class="water"></div>
      <div class="forest forest-left"></div>
      <div class="forest forest-right"></div>
      <div class="reeds reeds-left"></div>
      <div class="reeds reeds-right"></div>
    </div>

    <main id="app" class="app-shell">
      <section id="home-screen" class="screen active" aria-label="今日鸟签">
        <header class="hero">
          <div class="hero-copy">
            <p class="ghost-title">BIRD HABITAT</p>
            <p class="eyebrow" id="entry-label">NFC 轻量版</p>
            <h1>今日鸟签</h1>
            <p class="subcopy">碰一下，翻一张。让一只鸟替你描述今天的精神状态。</p>
          </div>
          <button class="nfc-pill" id="nfc-button" type="button">
            <span class="nfc-dot"></span>
            <span>已可访问</span>
          </button>
        </header>

        <section class="identity-strip" aria-label="本命鸟">
          <button id="home-bird-button" class="identity-art" type="button" aria-label="播放本命鸟鸟鸣">
            <img id="home-bird-image" src="" alt="" />
          </button>
          <div>
            <p class="tiny-label">你的本命鸟</p>
            <h2 id="home-bird-name">麻雀</h2>
            <p id="home-bird-line">体型小，适应力强，常在城市和村落活动。</p>
          </div>
        </section>

        <section class="draw-stage" aria-label="抽取今日鸟签">
          <div class="card-topline">
            <span id="today-text">今日</span>
            <span id="rarity-pill" class="rarity">待翻开</span>
          </div>

          <button id="draw-card" class="flip-card unrevealed" type="button" aria-label="翻开今日鸟签">
            <span class="card-watermark">BIRD SIGN</span>
            <span class="deck-shadow deck-one"></span>
            <span class="deck-shadow deck-two"></span>
            <span class="sealed-face">
              <span class="seal-ring"></span>
              <span class="seal-title">今日未翻开</span>
              <span class="seal-copy">点击翻牌，让一只鸟飞进今天。</span>
            </span>
            <span class="revealed-face">
              <span class="bird-frame">
                <img id="active-bird-image" src="" alt="" />
              </span>
              <span class="rank-row">
                <span id="rank-label">常见地点</span>
                <span id="heat-label">城市与村落</span>
              </span>
              <span class="state-label">今日精神状态</span>
              <strong id="active-bird-name" class="daily-name">麻雀</strong>
              <span id="active-bird-look" class="look-line">褐背、黑喉、小圆身</span>
              <span id="active-bird-quote" class="quote">今天像麻雀：事很多，但每件都能啄两口。</span>
            </span>
          </button>

          <div class="meter-grid">
            <div class="meter">
              <span>摸鱼指数</span>
              <strong id="fish-meter">★★★☆☆</strong>
            </div>
            <div class="meter">
              <span>社交电量</span>
              <strong id="social-meter">★★★★☆</strong>
            </div>
            <div class="meter">
              <span>开会耐受</span>
              <strong id="meeting-meter">★★☆☆☆</strong>
            </div>
          </div>

          <div class="primary-actions">
            <button id="draw-button" class="primary" type="button">翻开今日鸟签</button>
            <button id="nest-button" class="secondary" type="button">查看 34 只鸟图鉴</button>
          </div>
        </section>
      </section>

      <section id="nest-screen" class="screen" aria-label="鸟窝图鉴">
        <header class="page-head">
          <button id="back-home" class="icon-button" type="button" aria-label="返回今日鸟签">
            <svg viewBox="0 0 24 24" aria-hidden="true">
              <path d="M15 18l-6-6 6-6" />
            </svg>
          </button>
          <div>
            <p class="ghost-title small">FIELD GUIDE</p>
            <p class="eyebrow">鸟类图鉴</p>
            <h1>每只鸟一张签</h1>
          </div>
        </header>

        <section class="guide-summary">
          <div>
            <span>鸟类图鉴</span>
            <strong>34 / 34</strong>
          </div>
          <p class="call-hint">轻点带声波的图标听鸟鸣</p>
          <div class="progress-track">
            <span style="width: 100%"></span>
          </div>
        </section>

        <section id="bird-grid" class="bird-grid" aria-label="34 只鸟图鉴"></section>
      </section>
    </main>

    <nav class="tabbar" aria-label="页面切换">
      <button class="tab active" data-screen="home" type="button">今日</button>
      <button class="tab" data-screen="nest" type="button">鸟窝</button>
    </nav>
    <div id="toast" class="toast" role="status" aria-live="polite"></div>

    <script src="./app.js" type="module"></script>
  </body>
</html>
